name: makeup_app
description: 3D Makyaj Uygulaması - Flutter Mobil Uygulama
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  google_fonts: ^6.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  flutter_cube: ^0.1.1
  path: ^1.9.0
  camera: ^0.10.5
  image_picker: ^1.1.2
  http: ^1.6.0
  path_provider: ^2.1.5
  archive: ^4.0.9
  image: ^4.8.0
  file_picker: ^11.0.2
  vector_math: ^2.1.4
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/generated_model/
    - assets/models/